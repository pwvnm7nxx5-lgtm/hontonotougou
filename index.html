<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>特別支援アプリ</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Print Tools</p>
          <h1>特別支援アプリ</h1>
        </div>
        <div class="top-actions">
          <a class="resource-shortcut" href="apps/resource-links/index.html">外部教材を探す</a>
          <div class="status-pill">
            <span id="appCount">0</span>
            <span>件</span>
          </div>
        </div>
      </header>

      <section class="toolbar" aria-label="アプリ検索">
        <label class="search-field">
          <span>検索</span>
          <input id="searchInput" type="search" autocomplete="off" placeholder="アプリ名・用途で探す" />
        </label>
        <div class="filter-stack">
          <div id="gradeFilters" class="filter-row grade-row" aria-label="学年"></div>
          <div class="filter-line">
            <div id="categoryFilters" class="filter-row" aria-label="カテゴリ"></div>
            <button id="favoriteFilter" class="favorite-filter" type="button" aria-pressed="false">お気に入り</button>
          </div>
        </div>
      </section>

      <section id="appGrid" class="app-grid" aria-label="アプリ一覧"></section>
      <p id="emptyState" class="empty-state" hidden>該当するアプリはありません。</p>
    </main>

    <script src="apps.config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
