<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3年生 小数プリント</title>
  <link rel="stylesheet" href="../shared/grade3-dev/worksheet.css">
</head>
<body>
  <div class="app-shell">
    <aside class="controls" aria-label="プリント設定">
      <div class="brand">
        <h1 data-app-title>3年生 小数プリント</h1>
        <div class="brand-actions">
          <a class="home-link" href="../../index.html">入口に戻る</a>
          <span id="pageCount">2枚</span>
        </div>
      </div>
      <p class="notice" data-app-notice></p>
      <div class="row-fields">
        <label class="field"><span>名前</span><input id="studentName" type="text" autocomplete="off"></label>
        <label class="field"><span>日付</span><input id="worksheetDate" type="text" placeholder="5 / 7"></label>
      </div>
      <label class="field"><span>プリント名</span><input id="worksheetTitle" type="text"></label>
      <div class="settings-grid">
        <label class="field"><span>内容</span><select id="problemType"></select></label>
        <label class="field"><span>問題数</span><span class="combo-input"><input id="problemCount" type="number" min="1" max="36" step="1" value="24" inputmode="numeric"><select id="problemCountPreset" aria-label="問題数の候補"><option value="">候補</option><option value="6">6問</option><option value="12">12問</option><option value="18">18問</option><option value="24">24問</option><option value="36">36問</option></select></span></label>
        <label class="field"><span>列数</span><select id="columns"><option value="1">1列</option><option value="2" >2列</option><option value="3" selected>3列</option></select></label>
      </div>
      <label class="check-row"><input id="includeAnswers" type="checkbox" checked><span>答えページをつける</span></label>
      <div class="actions">
        <button id="printButton" type="button">印刷する</button>
        <button id="regenerateButton" type="button">作り直し</button>
        <button id="copyLinkButton" type="button">リンクをコピー</button>
      </div>
      <p id="status" class="status" aria-live="polite"></p>
    </aside>
    <main class="preview-wrap" aria-label="印刷プレビュー"><div id="pages" class="pages"></div></main>
  </div>
  <template id="pageTemplate">
    <section class="print-page">
      <header class="print-header"><div><p class="dev-badge">開発中</p><h2 data-title></h2></div><div class="student-line"><span>名前</span><strong data-name></strong><span>日付</span><strong data-date></strong></div></header>
      <p class="print-kind" data-kind></p>
      <div class="problem-grid" data-problems></div>
    </section>
  </template>
  <script>
    window.GRADE3_APP_CONFIG = {
      id: "decimal-print-grade3",
      title: "3年生 小数プリント",
      kind: "decimal",
      accent: "#7c3aed",
      notice: "小数プリントは開発中です。0.1単位のたし算・ひき算に絞っています。",
      defaultCount: 24,
      defaultColumns: 3,
      types: [
        { value: "add", label: "小数のたし算" },
        { value: "sub", label: "小数のひき算" },
      ],
    };
  </script>
  <script src="../shared/grade3-dev/worksheet.js"></script>
  <script src="../shared/print-adjustments.js"></script>
</body>
</html>
