<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>1年生 とけいプリント</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="controls" aria-label="プリント設定">
      <div class="brand">
        <h1>1年生 とけいプリント</h1>
        <div class="brand-actions">
          <a class="home-link" href="../../index.html">入口に戻る</a>
          <span id="pageCount">2枚</span>
        </div>
      </div>

      <div class="row-fields">
        <label class="field"><span>名前</span><input id="studentName" type="text" autocomplete="off"></label>
        <label class="field"><span>日付</span><input id="worksheetDate" type="text" autocomplete="off" placeholder="5 / 4"></label>
      </div>

      <label class="field"><span>プリント名</span><input id="worksheetTitle" type="text" autocomplete="off" value="1年生 とけいプリント"></label>

      <div class="settings-grid">
        <label class="field">
          <span>問題タイプ</span>
          <select id="problemType">
            <option value="read" selected>時刻を読む</option>
            <option value="draw">針をかく</option>
            <option value="mix">まぜて出題</option>
          </select>
        </label>
        <label class="field">
          <span>範囲</span>
          <select id="range">
            <option value="hour" selected>なんじ</option>
            <option value="half">なんじ・なんじはん</option>
          </select>
        </label>
        <label class="field">
          <span>問題数</span>
          <span class="combo-input">
            <input id="problemCount" type="number" min="1" max="24" step="1" value="8" inputmode="numeric">
            <select id="problemCountPreset" aria-label="問題数の候補">
              <option value="">候補</option>
              <option value="6">6問</option>
              <option value="8">8問</option>
              <option value="12">12問</option>
              <option value="24">24問</option>
            </select>
          </span>
        </label>
        <label class="field">
          <span>列数</span>
          <select id="columns">
            <option value="1">1列</option>
            <option value="2" selected>2列</option>
          </select>
        </label>
      </div>

      <div class="check-row">
        <label><input id="minuteLabels" type="checkbox"> 0ふん・30ふんを時計に入れる</label>
        <label><input id="includeAnswers" type="checkbox" checked disabled> 答えページをつける</label>
      </div>

      <div class="actions">
        <button id="printBtn" type="button">印刷 / PDF保存</button>
        <button id="regenerateBtn" type="button">作り直す</button>
        <button id="copyLinkBtn" type="button">共有URLをコピー</button>
      </div>

      <p id="status" class="status" role="status" aria-live="polite"></p>
    </aside>

    <main class="preview-wrap" aria-label="印刷プレビュー"><div id="pages" class="pages"></div></main>
  </div>

  <template id="pageTemplate">
    <section class="print-page">
      <header class="sheet-header">
        <div class="name-line">なまえ <span class="value" data-name></span></div>
        <div class="title" data-title></div>
        <div class="date-line">日づけ <span class="value" data-date></span></div>
        <div class="sheet-kind" data-kind></div>
      </header>
      <ol class="problem-grid" data-problems></ol>
    </section>
  </template>

  <script src="app.js"></script>
</body>
</html>
