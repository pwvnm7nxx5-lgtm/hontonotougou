      <div class="row-fields"><label class="field"><span>名前</span><input id="studentName" type="text" autocomplete="off"></label><label class="field"><span>日付</span><input id="worksheetDate" type="text" autocomplete="off" placeholder="5 / 3"></label></div>
      <label class="field"><span>プリント名</span><input id="worksheetTitle" type="text" autocomplete="off" value="2年生 表とグラフ"></label>

      <div class="check-row"><label><input id="includeAnswers" type="checkbox" checked> 答えページをつける</label></div>
      <div class="actions"><button id="printBtn" type="button">印刷 / PDF保存</button><button id="regenerateBtn" type="button">作り直す</button><button id="copyLinkBtn" type="button">共有URLをコピー</button></div>
      <p id="status" class="status" role="status" aria-live="polite"></p>
    </aside>
    <main class="preview-wrap" aria-label="印刷プレビュー"><div id="pages" class="pages"></div></main>
  </div>

  <script src="app.js"></script>
